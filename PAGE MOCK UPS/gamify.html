<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" charset="utf-8">

        <title>Tasks</title>

        <link rel="stylesheet" href="../CLIENT/styles.css">
 
    </head>

    <body>
    <!--
    Levelling system
    - exp earned for each task completed (can be more/less based on priority level/time of task/time before deadline / before scheduled )
    - milestone levels
        - visual updates for the character as they "grow"
    - rewards for reaching a new level (set ypur own rewards e.g play a game, watch a show for a certain length of time - option to pick from 3 rewards)
    Story based
    - you "play" as a cute little character and there is a story that gets developed with each level up
    - Character customisations
    - pick a genre? ambitious and a lot to do but allows the user to pick from multiple different stories and hopefully there would be a genre that interested them
        - fantasy, adventure, 
    Colour coding within timetable
    Quest List
    Item collection -> crafting
    Earn coins so you can buy aesthetic things, maybe upgrades e.g you need less exp to get to new levels
    Mini games accessed by levels / coins - difficulties 
    - jump rope
    Achievements
    -->
    
    <h2>Games</h2>

    <p> You have 10 coins </p>

    <progress id = "level_progress" value = "75" max = "100"></progress>
    <label for = "level_progress">Level 1</label>

    <h3>Quests</h3>
    <input type = "checkbox" id = "easy_quest" name = "easy_quest">
    <label for = "easy_quest">Complete a task that took less than an hour</label> <br>
    <input type = "checkbox" id = "medium_quest" name = "medium_quest">
    <label for = "medium_quest">Complete a task before it is scheduled</label> <br>
    <input type = "checkbox" id = "hard_quest" name = "hard_quest">
    <label for = "hard_quest">Complete a piece of summative coursework</label> <br>

    <h3>Rewards</h3>
    <input type = "checkbox" id = "reward_1" name = "reward_1">
    <label for = "reward_1">Watch an episode of your favourite show (Cost - 50 coins)</label> <br>
    <input type = "checkbox" id = "reward_2" name = "reward_2">
    <label for = "reward_2">Spend half an hour gaming (Cost - 75 coins)</label> <br>
    <input type = "checkbox" id = "reward_3" name = "reward_3">
    <label for = "reward_3">Spend an hour doing a puzzle or lego (Cost - 20 coins)</label> <br>
    <button> Purchase </button>

    </body>
</html>
