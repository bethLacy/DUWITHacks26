<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" charset="utf-8">

        <title>Tasks</title>

        <link rel="stylesheet" href="../CLIENT/styles.css">
 
    </head>

<body>
    <!-- 
    Deadline
    Time it might take
    Priority
    -->
    <p> <input type = "checkbox" id = "has_deadline"> The task has a deadline </p>
    <p> <input type = "datetime-local" id = "deadline"> </p>
    <p>How long should this task take approximately? <br> <input type = "textbox"> Hours <input type = "textbox"> Minutes </p> 
    <p><select name = priority>
        <option value = "low"> Low </option>
        <option value = "medium"> Medium </option>
        <option value = "high"> High </option>
    </select></p>
    <p><button>Add this task</button></p>
</body>
