<!doctype html>

<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" charset="utf-8">

        <title>Planner</title>

        <link rel="stylesheet" href="styles.css">
 
    </head>

    <body>

        <h1>Planner:</h1>
        <p>Make plans wooo</p>
        <table>
            <tr>
                <td class = "tableButton"><button id = "timetableButton">Upload timetable</button></td>
                <td class = "tableCheckbox"><input type="checkbox" id="timetableCheck" name="timetableCheck"></td>
            </tr>
            <tr>
               <td class = "tableButton"><button id = "taskButton">Add/modify tasks</button></td>
               <td class = "tableCheckbox"><input type="checkbox" id="taskCheck" name="taskCheck"></td>
            </tr>
            <tr>
                <td class = "tableButton"><button id = "dayButton">Set start and end of day</button></td>
                <td class = "tableCheckbox"><input type="checkbox" id="dayCheck" name="dayCheck"></td>
            </tr>
        </table>

        <div id = "loadSpace"></div>

        <script src="scripts.js"></script>

    </body>

</html>
