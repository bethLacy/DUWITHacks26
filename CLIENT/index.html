<!doctype html>

<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" charset="utf-8">

        <title>Planner</title>

        <link rel="stylesheet" href="styles.css">
 
    </head>

    <body>

        <h1>Planner:</h1>
        <p>Make plans wooo</p>

        <div class="button-group">

            <label class="item">
                <input type="checkbox" id = "timetableCheck">
                <span class="custom-box"></span>
                <button type="button" id = "timetableButton">Add/Modify timetable commitments</button>
            </label>

            <label class="item">
                <input type="checkbox" id = "taskCheck">
                <span class="custom-box"></span>
                <button type="button" id = "taskButton">Add/Modify tasks to complete</button>
            </label>

            <label class="item">
                <input type="checkbox" id = "timeCheck">
                <span class="custom-box"></span>
                <button type="button" id = "timeButton">Set times you are willing to work</button>
            </label>

            <label class="item">
                <input type="checkbox" id = "finishCheck">
                <span class="custom-box"></span>
                <button type="button" id = "finishButton">Set the date you would like me to plan to </button>
            </label>
            

        </div>


        <div id = "loadSpace"></div>

        <script src="scripts.js"></script>

    </body>

</html>
